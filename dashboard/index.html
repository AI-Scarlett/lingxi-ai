<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 灵犀数据看板 - Lingxi Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .panel-title {
            font-size: 18px;
            color: #333;
            font-weight: 600;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
        }
        
        .task-list {
            max-height: 600px;
            overflow-y: auto;
        }
        
        .task-item {
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        
        .task-item:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .task-id {
            font-size: 12px;
            color: #999;
            font-family: monospace;
        }
        
        .task-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-processing {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-completed {
            background: #d4edda;
            color: #155724;
        }
        
        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }
        
        .task-input {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        
        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #666;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .llm-badge {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .error-panel {
            margin-top: 20px;
        }
        
        .error-item {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        
        .error-type {
            font-weight: 600;
            color: #721c24;
            margin-bottom: 5px;
        }
        
        .error-message {
            font-size: 13px;
            color: #721c24;
        }
        
        .stage-indicator {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }
        
        .stage {
            flex: 1;
            text-align: center;
            padding: 5px;
            border-radius: 5px;
            font-size: 11px;
            background: #f0f0f0;
            color: #999;
        }
        
        .stage.active {
            background: #667eea;
            color: white;
        }
        
        .stage.completed {
            background: #28a745;
            color: white;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
        }
        
        .status-dot.disconnected {
            background: #dc3545;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 灵犀数据看板</h1>
            <div class="subtitle">
                Lingxi Dashboard - 实时监控任务执行情况
                <span class="connection-status" style="margin-left: 15px;">
                    <span class="status-dot" id="wsStatus"></span>
                    <span id="wsStatusText">连接中...</span>
                </span>
            </div>
        </header>
        
        <div class="stats-grid" id="statsGrid">
            <div class="loading">
                <div class="spinner"></div>
                加载统计数据...
            </div>
        </div>
        
        <div class="main-content">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">📋 最近任务</div>
                    <button class="refresh-btn" onclick="loadTasks()">🔄 刷新</button>
                </div>
                <div class="task-list" id="taskList">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载任务列表...
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">⚠️ 最近错误</div>
                </div>
                <div class="error-panel" id="errorPanel">
                    <div class="empty-state">暂无错误</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 从 URL 获取 Token
        const urlParams = new URLSearchParams(window.location.search);
        const TOKEN = urlParams.get('token') || '__DASHBOARD_TOKEN__';
        
        const API_BASE = '';
        let ws = null;
        let refreshInterval = null;
        
        // WebSocket 连接（带 Token）
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws?token=${TOKEN}`);
            
            ws.onopen = () => {
                document.getElementById('wsStatus').classList.remove('disconnected');
                document.getElementById('wsStatusText').textContent = '实时连接中';
            };
            
            ws.onclose = () => {
                document.getElementById('wsStatus').classList.add('disconnected');
                document.getElementById('wsStatusText').textContent = '已断开';
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
        }
        
        function handleWebSocketMessage(data) {
            console.log('WebSocket 消息:', data);
            
            if (data.type === 'task_started' || data.type === 'task_completed' || data.type === 'stage_update') {
                loadTasks(); // 实时更新任务列表
            }
        }
        
        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/stats?hours=24&token=${TOKEN}`);
                const stats = await response.json();
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${stats.total_tasks || 0}</div>
                        <div class="stat-label">总任务数 (24h)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.llm_calls || 0}</div>
                        <div class="stat-label">LLM 调用次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${(stats.avg_response_ms || 0).toFixed(1)}ms</div>
                        <div class="stat-label">平均响应时间</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${(stats.error_rate || 0).toFixed(1)}%</div>
                        <div class="stat-label">错误率</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${(stats.llm_cost || 0).toFixed(4)}</div>
                        <div class="stat-label">LLM 成本 ($)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.llm_tokens_in || 0}</div>
                        <div class="stat-label">输入 Tokens</div>
                    </div>
                `;
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }
        
        // 加载任务列表
        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/api/tasks?limit=20&token=${TOKEN}`);
                const data = await response.json();
                
                const taskList = document.getElementById('taskList');
                
                if (data.tasks.length === 0) {
                    taskList.innerHTML = '<div class="empty-state">暂无任务</div>';
                    return;
                }
                
                taskList.innerHTML = data.tasks.map(task => `
                    <div class="task-item">
                        <div class="task-header">
                            <span class="task-id">${task.id}</span>
                            <span class="task-status status-${task.status}">${getStatusText(task.status)}</span>
                        </div>
                        <div class="task-input">${escapeHtml(task.user_input)}</div>
                        <div class="task-meta">
                            <span class="meta-item">📱 ${task.channel}</span>
                            <span class="meta-item">⏱️ ${(task.execution_time_ms || 0).toFixed(1)}ms</span>
                            ${task.llm_called ? '<span class="llm-badge">🤖 LLM</span>' : ''}
                            ${task.llm_model ? `<span class="meta-item">🧠 ${task.llm_model}</span>` : ''}
                        </div>
                        <div class="stage-indicator">
                            ${getStageIndicator(task.stage)}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载任务列表失败:', error);
            }
        }
        
        // 加载错误列表
        async function loadErrors() {
            try {
                const response = await fetch(`${API_BASE}/api/errors?limit=10&token=${TOKEN}`);
                const data = await response.json();
                
                const errorPanel = document.getElementById('errorPanel');
                
                if (data.errors.length === 0) {
                    errorPanel.innerHTML = '<div class="empty-state">暂无错误</div>';
                    return;
                }
                
                errorPanel.innerHTML = data.errors.map(error => `
                    <div class="error-item">
                        <div class="error-type">${escapeHtml(error.error_type)}</div>
                        <div class="error-message">${escapeHtml(error.error_message)}</div>
                        <div style="font-size: 11px; color: #999; margin-top: 5px;">
                            ${formatTime(error.created_at)}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载错误列表失败:', error);
            }
        }
        
        function getStatusText(status) {
            const statusMap = {
                'pending': '等待中',
                'processing': '处理中',
                'completed': '已完成',
                'failed': '失败',
                'cancelled': '已取消'
            };
            return statusMap[status] || status;
        }
        
        function getStageIndicator(currentStage) {
            const stages = ['received', 'intent_analysis', 'task_decomposition', 'executing', 'aggregating', 'completed'];
            const currentIndex = stages.indexOf(currentStage);
            
            return stages.map((stage, index) => {
                let className = 'stage';
                if (index < currentIndex) className += ' completed';
                if (index === currentIndex) className += ' active';
                
                const stageNames = {
                    'received': '接收',
                    'intent_analysis': '分析',
                    'task_decomposition': '拆解',
                    'executing': '执行',
                    'aggregating': '汇总',
                    'completed': '完成'
                };
                
                return `<div class="${className}">${stageNames[stage] || stage}</div>`;
            }).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('zh-CN');
        }
        
        // 初始化
        function init() {
            connectWebSocket();
            loadStats();
            loadTasks();
            loadErrors();
            
            // 定时刷新
            refreshInterval = setInterval(() => {
                loadStats();
                loadTasks();
                loadErrors();
            }, 5000); // 每 5 秒刷新
        }
        
        // 启动
        init();
    </script>
</body>
</html>
