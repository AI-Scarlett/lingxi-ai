<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀 Dashboard - 养龙虾的最佳助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; }
        
        /* 侧边栏 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            overflow-y: auto;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .nav-item.active {
            background: rgba(255,255,255,0.3);
        }
        
        .nav-icon {
            margin-right: 10px;
            font-size: 18px;
        }
        
        /* 主内容区 */
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        /* 内容区域 */
        .content-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
        }
        
        .section-icon {
            margin-right: 10px;
        }
        
        /* 时间线 */
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline-item {
            position: relative;
            padding-bottom: 20px;
            border-left: 2px solid #667eea;
            padding-left: 20px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #667eea;
        }
        
        .timeline-time {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }
        
        .timeline-content {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }
        
        /* 表格 */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        /* 标签 */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-info { background: #d1ecf1; color: #0c5460; }
        
        /* 按钮 */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        /* 搜索框 */
        .search-box {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* 技能卡片 */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .skill-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .skill-card h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .skill-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="logo">🦞 灵犀 Dashboard</div>
        
        <div class="nav-item active" data-page="memories">
            <span class="nav-icon">🧠</span>
            <span>记忆管理</span>
        </div>
        
        <div class="nav-item" data-page="tasks">
            <span class="nav-icon">✅</span>
            <span>任务列表</span>
        </div>
        
        <div class="nav-item" data-page="skills">
            <span class="nav-icon">🎯</span>
            <span>技能中心</span>
        </div>
        
        <div class="nav-item" data-page="analytics">
            <span class="nav-icon">📈</span>
            <span>数据统计</span>
        </div>
        
        <div class="nav-item" data-page="logs">
            <span class="nav-icon">📝</span>
            <span>调用日志</span>
        </div>
        
        <div class="nav-item" data-page="settings">
            <span class="nav-icon">⚙️</span>
            <span>系统设置</span>
        </div>
    </div>
    
    <!-- 主内容区 -->
    <div class="main-content">
        <div class="header">
            <h1>🦞 灵犀 Dashboard</h1>
            <p style="color: #666;">养龙虾的最佳助手 · v3.3.3</p>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-memories">-</div>
                <div class="stat-label">记忆总数</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-value" id="stat-tasks">-</div>
                <div class="stat-label">任务总数</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-value" id="stat-skills">18</div>
                <div class="stat-label">技能数量</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-value" id="stat-calls">-</div>
                <div class="stat-label">今日调用</div>
            </div>
        </div>
        
        <!-- 记忆管理 -->
        <div class="content-section" id="page-memories">
            <h2 class="section-title">
                <span class="section-icon">🧠</span>
                记忆管理
            </h2>
            
            <div class="timeline" id="memories-timeline">
                <p style="color: #999; text-align: center;">加载中...</p>
            </div>
        </div>
        
        <!-- 任务列表 -->
        <div class="content-section" id="page-tasks" style="display: none;">
            <h2 class="section-title">
                <span class="section-icon">✅</span>
                任务列表
            </h2>
            
            <table>
                <thead>
                    <tr>
                        <th>任务 ID</th>
                        <th>任务内容</th>
                        <th>状态</th>
                        <th>完成时间</th>
                    </tr>
                </thead>
                <tbody id="tasks-tbody">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #999;">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- 技能中心 -->
        <div class="content-section" id="page-skills" style="display: none;">
            <h2 class="section-title">
                <span class="section-icon">🎯</span>
                技能中心
            </h2>
            
            <div class="skills-grid" id="skills-grid">
                <p style="color: #999; text-align: center;">加载中...</p>
            </div>
        </div>
        
        <!-- 数据统计 -->
        <div class="content-section" id="page-analytics" style="display: none;">
            <h2 class="section-title">
                <span class="section-icon">📈</span>
                数据统计
            </h2>
            
            <div class="stats-grid" id="analytics-stats">
                <div class="stat-card">
                    <div class="stat-value" id="analytics-memories">-</div>
                    <div class="stat-label">记忆读取</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-value" id="analytics-writes">-</div>
                    <div class="stat-label">记忆写入</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-value" id="analytics-tasks">-</div>
                    <div class="stat-label">任务执行</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-value" id="analytics-skills">-</div>
                    <div class="stat-label">技能调用</div>
                </div>
            </div>
        </div>
        
        <!-- 调用日志 -->
        <div class="content-section" id="page-logs" style="display: none;">
            <h2 class="section-title">
                <span class="section-icon">📝</span>
                调用日志
            </h2>
            
            <table>
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>技能</th>
                        <th>操作</th>
                        <th>耗时</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="logs-tbody">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #999;">暂无日志数据</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- 系统设置 -->
        <div class="content-section" id="page-settings" style="display: none;">
            <h2 class="section-title">
                <span class="section-icon">⚙️</span>
                系统设置
            </h2>
            
            <div style="max-width: 600px;">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">API 配置</label>
                    <input type="text" class="search-box" placeholder="Qwen API Key" value="sk-***">
                    <input type="text" class="search-box" placeholder="DashScope API Key" value="sk-***">
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">记忆配置</label>
                    <select class="search-box">
                        <option>STM 容量：100 条</option>
                        <option>MTM 保留：7 天</option>
                        <option>LTM 永久归档</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">推送时间</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="time" class="search-box" value="07:00">
                        <input type="time" class="search-box" value="12:00">
                        <input type="time" class="search-box" value="21:00">
                    </div>
                </div>
                
                <button class="btn btn-primary">💾 保存配置</button>
            </div>
        </div>
    </div>
    
    <script>
        // 页面切换
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                // 移除所有 active
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                
                // 隐藏所有页面
                const page = this.dataset.page;
                document.querySelectorAll('.content-section').forEach(section => {
                    section.style.display = 'none';
                });
                
                // 显示选中页面
                document.getElementById('page-' + page).style.display = 'block';
                
                // 加载对应数据
                if (page === 'memories') loadMemories();
                else if (page === 'tasks') loadTasks();
                else if (page === 'skills') loadSkills();
                else if (page === 'analytics') loadAnalytics();
                else if (page === 'logs') loadLogs();
            });
        });
        
        // 加载真实数据
        const API_BASE = '';
        const TOKEN = new URLSearchParams(window.location.search).get('token') || '';
        
        // 1. 加载记忆管理（时间线格式）
        async function loadMemories() {
            try {
                const res = await fetch(`${API_BASE}/api/tasks?limit=10&token=${TOKEN}`);
                const data = await res.json();
                
                const container = document.getElementById('memories-timeline');
                if (!container) return;
                
                if (data.tasks && data.tasks.length > 0) {
                    container.innerHTML = data.tasks.map(task => {
                        // completed_at 可能是时间戳或字符串
                        let time = '刚刚';
                        if (task.completed_at) {
                            if (typeof task.completed_at === 'number') {
                                // 时间戳（毫秒）
                                const date = new Date(task.completed_at);
                                time = date.toISOString().replace('T', ' ').substring(0, 16);
                            } else if (typeof task.completed_at === 'string') {
                                // ISO 字符串
                                time = task.completed_at.replace('T', ' ').substring(0, 16);
                            }
                        }
                        return `
                            <div class="timeline-item">
                                <div class="timeline-time">${time}</div>
                                <div class="timeline-content">
                                    <strong>${task.title}</strong>
                                    <p style="margin-top: 8px; color: #666;">${task.note || task.status || ''}</p>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    // 更新统计
                    document.getElementById('stat-memories').textContent = data.total || data.tasks.length;
                } else {
                    container.innerHTML = '<p style="color: #999; text-align: center;">暂无记忆数据</p>';
                }
            } catch (e) {
                console.error('加载记忆失败:', e);
                document.getElementById('memories-timeline').innerHTML = '<p style="color: red;">加载失败：' + e.message + '</p>';
            }
        }
        
        // 2. 加载任务列表（表格格式）
        async function loadTasks() {
            try {
                const res = await fetch(`${API_BASE}/api/tasks?limit=50&token=${TOKEN}`);
                const data = await res.json();
                
                const tbody = document.getElementById('tasks-tbody');
                if (!tbody) return;
                
                if (data.tasks && data.tasks.length > 0) {
                    tbody.innerHTML = data.tasks.map(task => {
                        // completed_at 可能是时间戳或字符串
                        let date = '-';
                        if (task.completed_at) {
                            if (typeof task.completed_at === 'number') {
                                // 时间戳（毫秒）
                                date = new Date(task.completed_at).toISOString().split('T')[0];
                            } else if (typeof task.completed_at === 'string') {
                                // ISO 字符串
                                date = task.completed_at.split('T')[0];
                            }
                        }
                        return `
                            <tr>
                                <td>${task.id}</td>
                                <td>${task.title}</td>
                                <td><span class="badge badge-success">${task.status}</span></td>
                                <td>${date}</td>
                            </tr>
                        `;
                    }).join('');
                    
                    // 更新统计
                    document.getElementById('stat-tasks').textContent = data.total || data.tasks.length;
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #999;">暂无任务数据</td></tr>';
                }
            } catch (e) {
                console.error('加载任务失败:', e);
                document.getElementById('tasks-tbody').innerHTML = '<tr><td colspan="4" style="text-align: center; color: red;">加载失败：' + e.message + '</td></tr>';
            }
        }
        
        // 3. 加载技能中心（18 个预置技能）
        async function loadSkills() {
            const skills = [
                { name: '🕐 时间查询', desc: '快速查询当前时间' },
                { name: '📅 日期查询', desc: '查询日期和星期' },
                { name: '🌤️ 天气查询', desc: '查询实时天气' },
                { name: '🔍 搜索专家', desc: '全网信息搜索' },
                { name: '📝 文案专家', desc: '营销文案创作' },
                { name: '🎨 图像专家', desc: '图片生成编辑' },
                { name: '📱 运营专家', desc: '小红书/微博发布' },
                { name: '💬 翻译专家', desc: '多语言翻译' },
                { name: '💕 情感回应', desc: '情感陪伴对话' },
                { name: '📊 数据分析', desc: '数据报表分析' },
                { name: '✍️ 写作专家', desc: '文章小说创作' },
                { name: '💻 代码专家', desc: '编程脚本开发' },
                { name: '🎵 音乐专家', desc: '音乐推荐播放' },
                { name: '📹 视频专家', desc: '视频处理剪辑' },
                { name: '🗣️ 语音专家', desc: '语音合成播放' },
                { name: '📸 摄影专家', desc: '图片处理优化' },
                { name: '🎮 游戏专家', desc: '游戏推荐攻略' },
                { name: '📚 学习专家', desc: '知识问答辅导' }
            ];
            
            const container = document.getElementById('skills-grid');
            if (!container) return;
            
            container.innerHTML = skills.map(skill => `
                <div class="skill-card">
                    <h3>${skill.name}</h3>
                    <p>${skill.desc}</p>
                    <span class="badge badge-success">已启用</span>
                </div>
            `).join('');
        }
        
        // 4. 加载数据统计
        async function loadAnalytics() {
            try {
                const res = await fetch(`${API_BASE}/api/stats?token=${TOKEN}`);
                const data = await res.json();
                
                document.getElementById('analytics-memories').textContent = data.total_memories || 0;
                document.getElementById('analytics-writes').textContent = data.total_memories || 0;
                document.getElementById('analytics-tasks').textContent = data.total_tasks || 0;
                document.getElementById('analytics-skills').textContent = data.total_skills || 18;
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }
        
        // 5. 加载调用日志
        async function loadLogs() {
            const tbody = document.getElementById('logs-tbody');
            if (!tbody) return;
            
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" style="text-align: center; color: #999;">
                        调用日志功能开发中...<br>
                        用于记录 API 调用/LLM 调用/工具使用历史
                    </td>
                </tr>
            `;
        }
        
        // 页面加载时获取数据
        window.addEventListener('DOMContentLoaded', () => {
            loadMemories();
            loadTasks();
            loadAnalytics();
        });
    </script>
</body>
</html>
