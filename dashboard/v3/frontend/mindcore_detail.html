<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCore 记忆核心 - 灵犀 Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { display: inline-flex; align-items: center; padding: 10px 20px; background: white; border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer; text-decoration: none; color: #333; }
        .back-btn:hover { background: #f8f9fa; }
        
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 20px; }
        .card h3 { margin-bottom: 20px; color: #333; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        
        .layer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .layer-card { padding: 20px; border-radius: 10px; color: white; position: relative; overflow: hidden; }
        .layer-stm { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .layer-mtm { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .layer-ltm { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        
        .layer-name { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .layer-desc { font-size: 14px; opacity: 0.9; margin-bottom: 15px; }
        .layer-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .layer-stat { background: rgba(255,255,255,0.2); padding: 10px; border-radius: 6px; }
        .layer-stat-value { font-size: 20px; font-weight: bold; }
        .layer-stat-label { font-size: 12px; opacity: 0.9; }
        
        .memory-list { margin-top: 15px; }
        .memory-item { padding: 15px; background: #f8f9fa; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #667eea; }
        .memory-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .memory-layer { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; background: #667eea; color: white; }
        .memory-importance { font-size: 14px; color: #f59e0b; font-weight: 600; }
        .memory-content { font-size: 14px; color: #333; line-height: 1.6; }
        .memory-meta { font-size: 12px; color: #999; margin-top: 10px; }
        
        .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .filter-btn { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }
        
        .loading { text-align: center; padding: 60px; color: #666; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/?token=1e4c2a9af43cd7001d00ce08b1a16d1a3d32b9de7d0e08ae4b" class="back-btn">← 返回列表</a>
            <h1>🧠 MindCore 记忆核心</h1>
        </div>
        
        <div id="content" class="loading"><div class="spinner"></div>加载中...</div>
    </div>

    <script>
        const formatTime = ts => { if (!ts) return '-'; const d = new Date(ts * 1000); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0'); };
        const getImportanceColor = score => score >= 9 ? '#dc3545' : score >= 7 ? '#f59e0b' : '#28a745';
        
        async function loadMindCoreStats() {
            const token = new URLSearchParams(window.location.search).get('token') || '';
            const r = await fetch('/api/mindcore/stats' + (token ? '?token=' + token : ''));
            if (!r.ok) throw new Error('加载失败');
            return await r.json();
        }
        
        async function loadMemories(layer = 'all') {
            const token = new URLSearchParams(window.location.search).get('token') || '';
            const r = await fetch(`/api/mindcore/memories?layer=${layer}&token=${token}`);
            if (!r.ok) throw new Error('加载失败');
            return await r.json();
        }
        
        function renderMindCore(stats) {
            return `
                <div class="card">
                    <h3>记忆层概览</h3>
                    <div class="layer-grid">
                        <div class="layer-card layer-stm">
                            <div class="layer-name">STM</div>
                            <div class="layer-desc">${stats.layers.STM.description}</div>
                            <div class="layer-stats">
                                <div class="layer-stat">
                                    <div class="layer-stat-value">${stats.layers.STM.current_size}/${stats.layers.STM.capacity}</div>
                                    <div class="layer-stat-label">容量使用</div>
                                </div>
                                <div class="layer-stat">
                                    <div class="layer-stat-value">${stats.layers.STM.ttl_seconds/60}min</div>
                                    <div class="layer-stat-label">存活时间</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="layer-card layer-mtm">
                            <div class="layer-name">MTM</div>
                            <div class="layer-desc">${stats.layers.MTM.description}</div>
                            <div class="layer-stats">
                                <div class="layer-stat">
                                    <div class="layer-stat-value">${stats.layers.MTM.current_size}/${stats.layers.MTM.capacity}</div>
                                    <div class="layer-stat-label">容量使用</div>
                                </div>
                                <div class="layer-stat">
                                    <div class="layer-stat-value">${stats.layers.MTM.ttl_seconds/86400}天</div>
                                    <div class="layer-stat-label">存活时间</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="layer-card layer-ltm">
                            <div class="layer-name">LTM</div>
                            <div class="layer-desc">${stats.layers.LTM.description}</div>
                            <div class="layer-stats">
                                <div class="layer-stat">
                                    <div class="layer-stat-value">${stats.layers.LTM.current_size}/∞</div>
                                    <div class="layer-stat-label">容量使用</div>
                                </div>
                                <div class="layer-stat">
                                    <div class="layer-stat-value">≥${stats.layers.LTM.min_importance}</div>
                                    <div class="layer-stat-label">最低重要性</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <h3>记忆列表</h3>
                    <div class="filter-bar">
                        <button class="filter-btn active" onclick="filterMemories('all')">全部</button>
                        <button class="filter-btn" onclick="filterMemories('STM')">STM</button>
                        <button class="filter-btn" onclick="filterMemories('MTM')">MTM</button>
                        <button class="filter-btn" onclick="filterMemories('LTM')">LTM</button>
                    </div>
                    <div id="memory-list" class="memory-list"></div>
                </div>
            `;
        }
        
        function renderMemories(memories) {
            if (!memories || memories.length === 0) {
                return '<p style="color:#999;text-align:center;padding:40px">暂无记忆数据</p>';
            }
            
            return memories.map(m => `
                <div class="memory-item">
                    <div class="memory-header">
                        <span class="memory-layer">${m.layer}</span>
                        <span class="memory-importance" style="color:${getImportanceColor(m.importance)}">
                            重要性：${m.importance}/10
                        </span>
                    </div>
                    <div class="memory-content">${m.content}</div>
                    <div class="memory-meta">
                        ID: ${m.id} | 创建：${formatTime(m.created_at)}
                    </div>
                </div>
            `).join('');
        }
        
        async function filterMemories(layer) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            try {
                const data = await loadMemories(layer);
                document.getElementById('memory-list').innerHTML = renderMemories(data.memories);
            } catch (e) {
                document.getElementById('memory-list').innerHTML = '<p style="color:red">加载失败：' + e.message + '</p>';
            }
        }
        
        async function init() {
            try {
                const [stats, memories] = await Promise.all([loadMindCoreStats(), loadMemories('all')]);
                document.getElementById('content').innerHTML = renderMindCore(stats);
                document.getElementById('memory-list').innerHTML = renderMemories(memories.memories);
            } catch (e) {
                document.getElementById('content').innerHTML = '<div class="loading">❌ 加载失败：' + e.message + '</div>';
            }
        }
        
        init();
    </script>
</body>
</html>
