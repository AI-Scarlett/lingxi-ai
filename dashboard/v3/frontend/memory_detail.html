<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆详情 - 灵犀 Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { display: inline-flex; align-items: center; padding: 10px 20px; background: white; border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer; text-decoration: none; color: #333; }
        .back-btn:hover { background: #f8f9fa; }
        
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 20px; }
        .card h3 { margin-bottom: 20px; color: #333; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        
        .importance-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .importance-critical { background: #764ba2; color: white; }
        .importance-high { background: #f59e0b; color: white; }
        .importance-medium { background: #3b82f6; color: white; }
        .importance-low { background: #9ca3af; color: white; }
        
        .layer-badge { display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; background: #667eea; color: white; }
        
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        
        .info-box { padding: 15px; background: #f8f9fa; border-radius: 8px; }
        .info-label { font-size: 12px; color: #666; margin-bottom: 5px; }
        .info-value { font-size: 15px; color: #333; font-weight: 500; }
        
        .content-box { background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 4px solid #667eea; margin: 15px 0; }
        .content-text { font-size: 15px; line-height: 1.8; color: #333; white-space: pre-wrap; }
        
        .tag { display: inline-block; padding: 4px 12px; background: #e9ecef; border-radius: 12px; font-size: 12px; color: #495057; margin: 3px; }
        
        .timeline { position: relative; padding-left: 30px; }
        .timeline-item { position: relative; padding-bottom: 20px; border-left: 2px solid #667eea; padding-left: 20px; }
        .timeline-item::before { content: ''; position: absolute; left: -6px; top: 0; width: 10px; height: 10px; border-radius: 50%; background: #667eea; }
        .timeline-time { font-size: 12px; color: #999; }
        .timeline-content { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-top: 5px; font-size: 13px; }
        
        .relation-item { padding: 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .relation-type { font-size: 12px; color: #666; }
        .relation-score { font-size: 14px; color: #667eea; font-weight: 600; }
        
        .loading { text-align: center; padding: 60px; color: #666; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="javascript:history.back()" class="back-btn">← 返回列表</a>
            <h1>记忆详情</h1>
        </div>
        <div id="content" class="loading"><div class="spinner"></div>加载中...</div>
    </div>

    <script>
        const formatTime = ts => { if (!ts) return '-'; const d = new Date(ts * 1000); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0'); };
        const getImportanceClass = score => {
            if (score >= 9) return 'critical';
            if (score >= 7) return 'high';
            if (score >= 4) return 'medium';
            return 'low';
        };
        
        async function loadMemoryDetail(id, source) {
            const token = new URLSearchParams(window.location.search).get('token') || '';
            const tokenParam = token ? '&token=' + token : '';
            const r = await fetch(`/api/memory/${id}?source=${source||'stm'}${tokenParam}`);
            if (!r.ok) throw new Error('加载失败');
            return await r.json();
        }
        
        async function loadMemoryTimeline(id) {
            try {
                const r = await fetch(`/api/memory/${id}/timeline`);
                if (r.ok) return await r.json();
            } catch(e) {}
            return {timeline: []};
        }
        
        function renderMemory(mem) {
            const impClass = getImportanceClass(mem.importance);
            const tagsHtml = mem.tags && mem.tags.length > 0 ? mem.tags.map(t => `<span class="tag">${t}</span>`).join('') : '<span style="color:#999">无标签</span>';
            
            return `
                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:20px">
                        <div>
                            <h2 style="margin-bottom:10px">记忆 #${mem.id.substring(0,8)}</h2>
                            <div>
                                <span class="layer-badge">${mem.source.layer}</span>
                                <span class="importance-badge importance-${impClass}" style="margin-left:10px">重要性：${mem.importance}/10</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="content-box">
                        <div class="content-text">${mem.content}</div>
                    </div>
                    
                    <div class="grid-3">
                        <div class="info-box"><div class="info-label">创建时间</div><div class="info-value">${formatTime(mem.created_at)}</div></div>
                        <div class="info-box"><div class="info-label">最后访问</div><div class="info-value">${formatTime(mem.last_accessed)}</div></div>
                        <div class="info-box"><div class="info-label">访问次数</div><div class="info-value">${mem.access_count} 次</div></div>
                    </div>
                </div>
                
                <div class="card">
                    <h3>标签</h3>
                    <div>${tagsHtml}</div>
                </div>
                
                <div class="card">
                    <h3>访问时间线</h3>
                    <div id="timeline" class="timeline"></div>
                </div>
                
                ${mem.relations && mem.relations.length > 0 ? `
                <div class="card">
                    <h3>关联记忆 (${mem.relations.length})</h3>
                    ${mem.relations.map(rel => `
                        <div class="relation-item">
                            <div>
                                <div style="font-weight:600">${rel.related_memory_id.substring(0,12)}</div>
                                <div class="relation-type">${rel.relation_type}</div>
                            </div>
                            <div class="relation-score">相似度：${(rel.similarity_score*100).toFixed(1)}%</div>
                        </div>
                    `).join('')}
                </div>
                ` : ''}
                
                ${mem.recent_accesses && mem.recent_accesses.length > 0 ? `
                <div class="card">
                    <h3>最近访问记录</h3>
                    <table style="width:100%;border-collapse:collapse">
                        <thead><tr><th style="text-align:left;padding:10px;background:#f8f9fa">时间</th><th style="text-align:left;padding:10px;background:#f8f9fa">类型</th><th style="text-align:left;padding:10px;background:#f8f9fa">会话 ID</th></tr></thead>
                        <tbody>
                            ${mem.recent_accesses.map(acc => `
                                <tr>
                                    <td style="padding:10px;border-bottom:1px solid #eee">${formatTime(acc.timestamp)}</td>
                                    <td style="padding:10px;border-bottom:1px solid #eee">${acc.access_type}</td>
                                    <td style="padding:10px;border-bottom:1px solid #eee">${acc.session_id||'-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                ` : ''}
            `;
        }
        
        function renderTimeline(items) {
            const el = document.getElementById('timeline');
            if (!el || !items || items.length === 0) {
                if (el) el.innerHTML = '<p style="color:#999">暂无时间线数据</p>';
                return;
            }
            el.innerHTML = items.map(item => `
                <div class="timeline-item">
                    <div class="timeline-time">${formatTime(item.time)}</div>
                    <div class="timeline-content">${item.label}${item.description?': '+item.description:''}</div>
                </div>
            `).join('');
        }
        
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const source = params.get('source') || 'stm';
            
            if (!id) {
                document.getElementById('content').innerHTML = '<div class="loading">❌ 缺少记忆 ID 参数</div>';
                return;
            }
            
            try {
                const [mem, timelineData] = await Promise.all([loadMemoryDetail(id, source), loadMemoryTimeline(id)]);
                document.getElementById('content').innerHTML = renderMemory(mem);
                renderTimeline(timelineData.timeline || []);
            } catch (e) {
                document.getElementById('content').innerHTML = '<div class="loading">❌ 加载失败：' + e.message + '</div>';
            }
        }
        
        init();
    </script>
</body>
</html>
